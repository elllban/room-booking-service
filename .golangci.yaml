version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - unused
    - misspell

formatters:
  enable:
    - gofmt

issues:
  exclude-rules:
    - path: '_test\.go'
      linters:
        - errcheck
        - unused

linters-settings:
  govet:
    enable-all: true
  errcheck:
    check-blank: true
  misspell:
    locale: US

formatters-settings:
  gofmt:
    simplify: true
